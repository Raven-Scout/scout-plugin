  <!-- text -->
  <g font-family="'Iowan Old Style','Palatino Linotype',Georgia,serif">
    <text x="300" y="250" font-size="62" font-weight="500" fill="#1c1814" letter-spacing="-1">Nothing falls through the cracks —</text>
    <text x="300" y="328" font-size="62" font-weight="500" font-style="italic" fill="#b4541f" letter-spacing="-1">and you can trust what it surfaces.</text>
