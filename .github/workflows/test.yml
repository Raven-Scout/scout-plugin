name: test

on:
  push:
    branches: [main, "migrate/**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Setup Python
        run: uv python install ${{ matrix.python }}
      - name: Create venv
        run: uv venv --python ${{ matrix.python }}
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Pytest
        run: .venv/bin/pytest tests/ -v
      - name: Verify connectors.snapshot.json drift
        # The canonical snapshot lives at engine/scout/connectors.snapshot.json
        # (Plan 4 Task 8). scout-app's bundled fixture is a synced copy. CI
        # here checks the canonical file is in sync with the YAML — drift =
        # someone edited connectors.yaml and forgot to regenerate.
        run: .venv/bin/python -m scout.scripts.connectors_snapshot --check --target scout/connectors.snapshot.json
